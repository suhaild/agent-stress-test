<!doctype html>
<html lang="en" class="h-full">
<head>
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        if (saved === 'light' || saved === 'dark') {
          document.documentElement.setAttribute('data-theme', saved);
        }
      } catch (e) {}
    })();
  </script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Agent Stress-Test{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Tailwind's JIT CDN build can't be given an SRI hash (compiled on the fly); every other script below is pinned + hashed. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"
          integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"
          integrity="sha384-OZrRw8/Zvv0VFGJJF6TN3gABVZvvO60Xz7RWkQKAmoRe+t1dc5J/ySJvXbpL+N+Q"
          crossorigin="anonymous"></script>
  <script defer src="https://unpkg.com/@alpinejs/collapse@3.14.1/dist/cdn.min.js"
          integrity="sha384-NArNwzWsUSF+kY2lgW4YriEkjLqi+J+za6HrENUn/3nZqkBnWbxV22kCJEK5Uu6n"
          crossorigin="anonymous"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"
          integrity="sha384-l8f0VcPi/M1iHPv8egOnY/15TDwqgbOR1anMIJWvU6nLRgZVLTLSaNqi/TOoT5Fh"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/chart.js@4.5.1/dist/chart.umd.min.js"
          integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ"
          crossorigin="anonymous"></script>
  {% include "_styles.html" %}
</head>
<body class="min-h-screen antialiased">
  <header class="px-6 md:px-10 py-6 flex items-center justify-between">
    <a href="/" class="flex items-baseline gap-3">
      <span class="brand-mark text-2xl md:text-3xl">Agent Stress-Test</span>
    </a>
    <div class="flex items-center gap-3">
      <span class="tag-label hidden sm:inline">Adversarial Reliability Lab</span>
      <button id="theme-toggle" type="button" class="btn-ghost" aria-label="Toggle color theme" style="padding: .5rem .6rem;">
        <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </div>
  </header>
  <div class="hazard-bar"></div>
  <main class="max-w-5xl mx-auto px-6 md:px-10 py-10">
    {% block content %}{% endblock %}
  </main>

  <div x-data class="fixed bottom-6 right-6 z-50 flex flex-col-reverse gap-2.5 items-end pointer-events-none" style="max-width: calc(100vw - 3rem);">
    <template x-for="toast in $store.toasts" :key="toast.id">
      <div class="toast" :class="toast.kind === 'warn' ? 'toast-warn' : ''"
           x-init="setTimeout(() => $store.toasts = $store.toasts.filter(t => t.id !== toast.id), 4000)"
           x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
           x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0">
        <span class="toast-icon" x-text="toast.kind === 'warn' ? '!' : '×'"></span>
        <span class="toast-message" x-text="toast.message"></span>
        <button type="button" class="toast-close" aria-label="Dismiss"
                @click="$store.toasts = $store.toasts.filter(t => t.id !== toast.id)">✕</button>
      </div>
    </template>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.store('toasts', []);

      // Shared by the model pickers (single-select) and tactics picker (multi-select).
      Alpine.data('dropdown', (initial = {}) => ({
        open: false,
        value: initial.value,
        label: initial.label,
      }));
      Alpine.data('multiSelect', (initial = {}) => ({
        open: false,
        selected: initial.selected || [],
      }));
    });
    // Makes every hx-swapped widget Alpine-reactive without double-initializing existing nodes.
    document.body.addEventListener('htmx:afterSettle', e => Alpine.initTree(e.detail.elt));
    function chartThemeColors() {
      var style = getComputedStyle(document.documentElement);
      var read = function (name) { return style.getPropertyValue(name).trim(); };
      return {
        accent: read('--accent'), pass: read('--pass'), warn: read('--warn'),
        fail: read('--fail'), ink: read('--ink'), inkDim: read('--ink-dim'),
        gridLine: read('--grid-line'), wire: read('--wire'),
        fontMono: read('--font-mono'),
      };
    }
    function pushToast(message, kind) {
      var toasts = Alpine.store('toasts');
      var last = toasts[toasts.length - 1];
      if (last && last.message === message) return; // don't stack identical back-to-back toasts
      toasts.push({ id: Date.now() + Math.random(), message: message, kind: kind || 'error' });
      while (toasts.length > 4) toasts.shift(); // cap how many can pile up at once
    }
    function messageFromXhr(xhr, fallback) {
      try {
        var body = JSON.parse(xhr.responseText);
        if (body && body.detail) return body.detail;
      } catch (e) {}
      return fallback;
    }
    document.body.addEventListener('htmx:responseError', function (evt) {
      var xhr = evt.detail.xhr;
      var fallback = 'Request failed (' + xhr.status + ').';
      pushToast(messageFromXhr(xhr, fallback), 'error');
    });
    document.body.addEventListener('htmx:sendError', function () {
      pushToast('Could not reach the server. Is the dashboard still running?', 'error');
    });
    document.body.addEventListener('htmx:sseError', function (evt) {
      // htmx's SSE extension can't tell a deliberate server close from a real
      // break, and retries either way -- skip the error toast if already terminal.
      var elt = evt.target;
      var badge = document.querySelector('[data-status]');
      var status = badge ? badge.getAttribute('data-status') : null;
      if (status === 'completed' || status === 'failed') {
        if (elt && elt.removeAttribute) elt.removeAttribute('sse-connect');
        if (evt.detail && evt.detail.source) evt.detail.source.close();
        return;
      }
      pushToast('Live updates disconnected — refresh the page to see the latest status.', 'warn');
    });
  </script>
  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      btn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme');
        if (!current) {
          current = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
      });
    })();
  </script>
</body>
</html>
