[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-stress-test"
version = "0.1.0"
description = "Pre-deployment adversarial stress-testing for AI agents."
requires-python = ">=3.11"
dependencies = [
    "litellm",
    "pydantic",
    "rich",
    "textual",
    "pyyaml",
    "python-dotenv",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agent_stress_test"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
src = ["src"]
