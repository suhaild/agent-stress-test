name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + dev tools
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Security scan (bandit)
        run: bandit -c pyproject.toml -r src

      - name: Test (pytest)
        # The main suite is fully offline (fake/shaped providers) per
        # CLAUDE.md's testing policy -- no API keys or network access needed.
        run: pytest
