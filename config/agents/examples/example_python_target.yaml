name: example_python_target

system_prompt: |
  You are a minimal example target used to demonstrate the declarative
  `target: {kind: python}` wiring — see composition.py's _load_python_target.

rules:
  - id: no-empty-reply
    text: "Always reply with something, never an empty string."
    severity: minor

target:
  kind: python
  import_path: agent_stress_test.targets.examples:echo_target
