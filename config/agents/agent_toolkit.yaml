name: agent_toolkit

# Mirrors agent-toolkit's own default system prompt (src/config.py's
# AgentConfig.system_prompt) so a system-prompt fix suggested and applied
# through this stress-tester is the prompt the real agent actually runs on
# its next run, not just a record kept for display.
system_prompt: |
  You are a helpful AI assistant with access to tools.
  Use tools when needed to answer questions accurately.
  Always show your reasoning step by step.

tools:
  - name: calculator
    description: >
      Evaluate mathematical expressions safely (AST-based, no eval). Supports
      +, -, *, /, //, %, ** and common functions (sqrt, log, sin, cos, tan).
  - name: web_search
    description: >
      Search the web via DuckDuckGo HTML and return titles, URLs, and snippets
      for the top results. No API key required.
  - name: web_fetch
    description: >
      Fetch a web page by URL and return its text content, with HTML
      converted to plain text.

rules:
  - id: no-invented-search-claims
    text: "Never claim to have searched the web or found something online unless web_search or web_fetch was actually called."
    severity: major
    check_type: ungrounded_claim
    params:
      required_tool: web_search
      data_patterns:
        - '\bI (?:searched|looked (?:it )?up|found (?:this|that) online)\b'
        - '\baccording to (?:my search|the search results|what I found online)\b'
        - '\bbased on (?:my|a) (?:web )?search\b'
  - id: no-invented-calculations
    text: "Never state a computed numeric result without first calling the calculator tool."
    severity: minor
    check_type: ungrounded_claim
    params:
      required_tool: calculator
      data_patterns:
        - '\bthe (?:answer|result) is\s+-?\d'
        - '\bequals?\s+-?\d+(?:\.\d+)?\b'
